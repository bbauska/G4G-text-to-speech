<!DOCTYPE html>
<html lang="en">
<!--~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~-->
<!--~~~~~~~~~~~~~~~~~~~~~~~ index.html of text-to-speech.bauska.org ~~~~~~~~~~~~~~~~~~~~~~~~~~~~-->
<!--~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content=
    "width=device-width, initial-scale=1.0">
  <title>Text to Speech Converter</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container">
    <div class="app-container">
      <div class="headings-container">
        <h1>Text to Speech Converter</h1>
        <h3>Enter Text and Convert into Speech</h3>
      </div>

      <div class="interaction-container">
        <textarea id="textToConvert" 
          placeholder="There once was a man from Sash. 
          Whose balls were made of glass. 
          When you rubbed them together, 
          they made stormy weather,

          And lightning struck out of his ass." 
          id="" cols="35" rows="10" 
          class="text-control"></textarea>

        <p class="error-para"></p>

        <button class="btn" id="convertBtn">
          Play Converted Sound
        </button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
