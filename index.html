<body>
  <div class="container">
    <div class="app-container">
      <div class="headings-container">
        <h1>Text to Speech Converter</h1>
        <h3>Enter Text and Convert into Speech</h3>
      </div>
<!--
		There once was a man from Sash,
		  whose balls were made of glass. 
          When you rubbed them together, 
          they made stormy weather...

          And lightning struck out of his ass
-->
      <div class="interaction-container">
        <textarea id="textToConvert" 
          placeholder="Come and listen to a story
about a man named Jed
A poor mountaineer, barely
kept his family fed,
And then one day he was
shootin at some food,
And up through the ground
came a bubblin crude.

Oil that is, black gold, Texas tea.

Well the first thing you
know ol Jed's a millionaire,
Kinfolk said "Jed move away from there"
Said "Californy is the
place you ought to be"
So they loaded up the
truck and moved to Beverly

Hills, that is. Swimmin
pools, movie stars.

Well now its time to say goodbye
to Jed and all his kin.
And they would like to thank you
folks fer kindly droppin in.
You're all invited back next
week to this locality
To have a heapin helpin
of their hospitality

Hillybilly that is. Set a
spell, Take your shoes off.

Y'all come back now, y'hear?.." 
          id="" cols="35" rows="10" 
          class="text-control"></textarea>

        <p class="error-para"></p>

        <button class="btn" id="convertBtn">
          Play Converted Sound
        </button>
      </div>
    </div>  <!-- class='app-container' -->
  </div>  <!-- class='container' -->
